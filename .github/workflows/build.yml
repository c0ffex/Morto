name: Build CallBlock IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xtool
        run: brew install xtool-org/tap/xtool

      - name: Build IPA
        run: |
          export CODE_SIGNING_ALLOWED=No
          xtool dev build --ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CallBlock.ipa
          path: .build/*.ipa
          if-no-files-found: error
